name: inspect

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact ZIP via GitHub API
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -eux

          ARTIFACT_ID=7705052240

          curl -L \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -o artifact.zip \
            "https://api.github.com/repos/adamwasowicz9-yansk/urban-winner/actions/artifacts/${ARTIFACT_ID}/zip"

          ls -lh artifact.zip

      - name: Extract artifact
        run: |
          unzip artifact.zip -d artifact
          find artifact -type f

      - name: Extract tar.md5
        run: |
          FILE=$(find artifact -name "*.tar.md5" | head -n1)

          echo "Found: $FILE"

          cp "$FILE" firmware.tar

          tar -tf firmware.tar | head -100

          mkdir fw
          tar -xf firmware.tar -C fw

          echo "=== extracted ==="
          find fw -maxdepth 2 -type f

      - name: Identify partitions
        run: |
          sudo apt-get update
          sudo apt-get install -y simg2img lz4

          find fw -type f | while read f; do
            echo
            echo "==== $f ===="
            file "$f"
          done

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: inspection-results
          path: |
            artifact
            fw
