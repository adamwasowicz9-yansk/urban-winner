name: Inspect AP firmware

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download AP artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GH_PAT }}
          repository: adamwasowicz9-yansk/urban-winner
          run-id: 27711530815
          name: AP_S901EXXSDGZB6
          path: ap

      - name: Show downloaded files
        run: |
          echo "===== DOWNLOADED ====="
          find ap | sort

      - name: Locate archive
        run: |
          FILE=$(find ap -type f | head -1)

          echo "FILE=$FILE" >> $GITHUB_ENV

          echo "===== FILE ====="
          ls -lh "$FILE"

          echo
          echo "===== TYPE ====="
          file "$FILE"

      - name: Extract ZIP if needed
        run: |
          mkdir extracted

          if file "$FILE" | grep -qi zip; then
            unzip -q "$FILE" -d extracted
          else
            cp "$FILE" extracted/
          fi

          echo "===== EXTRACTED ====="
          find extracted | sort

      - name: Find TAR.MD5
        run: |
          TAR=$(find extracted -iname "*.tar.md5" | head -1)

          echo "TAR=$TAR" >> $GITHUB_ENV

          echo "===== TAR.MD5 ====="
          ls -lh "$TAR"

      - name: List TAR contents
        run: |
          tar -tvf "$TAR" > tar_contents.txt

          echo "===== FIRST 300 ====="
          head -300 tar_contents.txt

          echo
          echo "===== LAST 300 ====="
          tail -300 tar_contents.txt

      - name: Categorize images
        run: |
          tar -tvf "$TAR" | grep -Ei '\.(img|lz4|bin|mbn|elf)$' > partitions.txt || true

          echo "===== PARTITIONS ====="
          cat partitions.txt

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: ap-inspection
          path: |
            tar_contents.txt
            partitions.txt
