name: Inspect m1v7kv

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download archive
        run: |
          wget -O m1v7kv.zip \
            "https://github.com/adamwasowicz9-yansk/johnas/releases/download/v69/m1v7kv.zip"

          ls -lh m1v7kv.zip

      - name: Extract archive
        run: |
          mkdir extracted
          unzip -q m1v7kv.zip -d extracted

      - name: Generate report
        run: |
          {
            echo "===== ALL FILES ====="
            find extracted -type f | sort

            echo
            echo "===== PRISM ====="
            find extracted -type f | grep -i prism || true

            echo
            echo "===== OPTICS ====="
            find extracted -type f | grep -i optics || true

            echo
            echo "===== OMC ====="
            find extracted -type f | grep -i omc || true

            echo
            echo "===== IMG FILES ====="
            find extracted -type f \( -name "*.img" -o -name "*.ext4" \) | sort

            echo
            echo "===== FILE SIZES ====="
            du -sh extracted/* 2>/dev/null || true

          } > report.txt

          cat report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: m1v7kv-report
          path: report.txt
