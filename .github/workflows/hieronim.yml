name: Inspect CSC Contents

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download CSC package
        run: |
          wget -O csc.zip \
            "https://github.com/adamwasowicz9-yansk/johnas/releases/download/v69/m1v7kv.zip"

      - name: Extract ZIP
        run: |
          mkdir zip_extract
          unzip -q csc.zip -d zip_extract

          echo "===== ZIP CONTENT ====="
          find zip_extract -type f | sort

      - name: Extract CSC tar.md5
        run: |
          mkdir csc_extract

          CSCFILE=$(find zip_extract -name "*.tar.md5" | head -1)

          echo "Using:"
          echo "$CSCFILE"

          head -c -33 "$CSCFILE" | tar xf - -C csc_extract

      - name: Generate report
        run: |
          {
            echo "===== CSC FILES ====="
            find csc_extract -type f | sort

            echo
            echo "===== PRISM ====="
            find csc_extract -type f | grep -i prism || true

            echo
            echo "===== OPTICS ====="
            find csc_extract -type f | grep -i optics || true

            echo
            echo "===== OMC ====="
            find csc_extract -type f | grep -i omc || true

            echo
            echo "===== IMG FILES ====="
            find csc_extract -type f -name "*.img" | sort

            echo
            echo "===== DAT FILES ====="
            find csc_extract -type f | grep -E '\.dat$|\.new\.dat$|\.patch\.dat$' || true

            echo
            echo "===== FILE SIZES ====="
            du -sh csc_extract/* 2>/dev/null || true

          } > report.txt

          cat report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: csc-inspection-report
          path: report.txt
