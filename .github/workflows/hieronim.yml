name: Extract OTA Patch Commands

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download OTA
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota

          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/adamwasowicz9-yansk/johnas/actions/artifacts/7709183127/zip"

          unzip -q ota.zip -d ota

      - name: Extract OTA
        run: |
          mkdir -p ota_extracted

          OTAFILE=$(find ota -type f | head -1)

          unzip -q "$OTAFILE" -d ota_extracted

      - name: Dump updater-script
        run: |
          SCRIPT="ota_extracted/META-INF/com/google/android/updater-script"

          {
            echo "===== APPLY_PATCH ====="
            grep -n "apply_patch" "$SCRIPT" || true

            echo
            echo "===== BLOCK_IMAGE_UPDATE ====="
            grep -n "block_image_update" "$SCRIPT" || true

            echo
            echo "===== NON-HLOS ====="
            grep -n "NON-HLOS" "$SCRIPT" || true

            echo
            echo "===== MODEM ====="
            grep -n "modem" "$SCRIPT" || true

            echo
            echo "===== BOOT ====="
            grep -n "boot" "$SCRIPT" || true

          } > report.txt

          cat report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: updater-script-report
          path: report.txt
