name: Dump Updater Script

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota

          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/adamwasowicz9-yansk/johnas/actions/artifacts/7709183127/zip"

          unzip -q ota.zip -d ota

      - name: Extract OTA
        run: |
          mkdir -p ota_extracted

          OTAFILE=$(find ota -type f | head -1)

          echo "Using OTA:"
          echo "$OTAFILE"

          unzip -q "$OTAFILE" -d ota_extracted

      - name: Dump apply_patch entries
        run: |
          echo "===== APPLY_PATCH ====="

          grep -n "apply_patch" \
            ota_extracted/META-INF/com/google/android/updater-script \
            > apply_patch.txt || true

          cat apply_patch.txt

          echo
          echo "===== FIRST 300 LINES ====="

          sed -n '1,300p' \
            ota_extracted/META-INF/com/google/android/updater-script \
            > updater_head.txt

          cat updater_head.txt

      - name: Upload dump
        uses: actions/upload-artifact@v4
        with:
          name: updater-script-dump
          path: |
            apply_patch.txt
            updater_head.txt
