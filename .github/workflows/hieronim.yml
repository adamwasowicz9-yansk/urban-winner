name: Test Prism Optics

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download CSC package
        run: |
          wget -O csc.zip \
            "https://github.com/adamwasowicz9-yansk/johnas/releases/download/v69/m1v7kv.zip"

      - name: Extract CSC
        run: |
          mkdir zip_extract
          unzip -q csc.zip -d zip_extract

          CSCFILE=$(find zip_extract -name "*.tar.md5" | head -1)

          mkdir csc_extract
          head -c -33 "$CSCFILE" | tar xf - -C csc_extract

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lz4 file android-sdk-libsparse-utils

      - name: Decompress prism/optics
        run: |
          cd csc_extract

          lz4 -d prism.img.lz4 prism.img
          lz4 -d optics.img.lz4 optics.img

          echo "===== FILE TYPES =====" > report.txt
          file prism.img >> report.txt
          file optics.img >> report.txt

          echo >> report.txt
          echo "===== SIZES =====" >> report.txt
          ls -lh prism.img optics.img >> report.txt

          echo >> report.txt
          echo "===== FIRST BYTES =====" >> report.txt

          xxd -l 64 prism.img >> report.txt
          echo >> report.txt
          xxd -l 64 optics.img >> report.txt

          cat report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: prism-optics-test
          path: csc_extract/report.txt
