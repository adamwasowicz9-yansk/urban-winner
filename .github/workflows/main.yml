name: Samsung AP Extractor

on:
  workflow_dispatch:

jobs:
  download-fw:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          python3 -m pip install --upgrade pip
          pip install git+https://github.com/adamwasowicz9-yansk/samloader.git

      - name: Download firmware
        run: |
          samloader download \
            SM-S901E \
            GLB \
            "S901EXXSDGZB6/S901EOXMDGZB6/S901EXXSDGZB6/S901EXXSDGZB6" \
            firmware.zip.enc4

      - name: Decrypt firmware
        run: |
          samloader decrypt firmware.zip.enc4 firmware.zip

      - name: Extract firmware
        run: |
          mkdir firmware
          unzip -o firmware.zip -d firmware

      - name: Collect AP
        run: |
          AP_FILE=$(find firmware -type f -name "AP_*.tar.md5" | head -n 1)

          if [ -z "$AP_FILE" ]; then
            echo "AP file not found"
            exit 1
          fi

          mkdir artifact
          cp "$AP_FILE" artifact/AP.tar.md5

      - name: Upload AP artifact
        uses: actions/upload-artifact@v4
        with:
          name: AP_S901EXXSDGZB6
          path: artifact/AP.tar.md5
          compression-level: 0
          retention-days: 7
