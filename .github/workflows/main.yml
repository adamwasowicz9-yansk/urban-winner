name: Download Specific Samsung Firmware (Only AP)

on:
  workflow_dispatch:

jobs:
  download-fw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install samloader-rs
        run: |
          echo "Pobieranie samloader-rs 1.2.0..."
          wget https://github.com/topjohnwu/samloader-rs/releases/download/1.2.0/samloader-linux-x86_64.tar.xz
          tar -xJf samloader-linux-x86_64.tar.xz
          sudo mv samloader /usr/local/bin/
          rm samloader-linux-x86_64.tar.xz
          samloader --version

      - name: Fetch and Download Firmware
        run: |
          MODEL="SM-S901E"
          CSC_REGION="GLB"
          
          # Definiujemy konkretne wersje komponentów softu
          PDA="S901EXXSDGZB6"
          CSC="S901EOXMDGZB6"
          PHONE="S901EXXSDGZB6"
          
          mkdir -p ./firmware
          
          echo "Pobieranie konkretnej wersji: $PDA..."
          # Używamy flag -p, -c, -b zamiast automatycznego sprawdzania aktualizacji
          samloader download -m "$MODEL" -r "$CSC_REGION" -p "$PDA" -c "$CSC" -b "$PHONE" -o ./firmware/
          
          echo "Zawartość katalogu po pobraniu:"
          ls -lh ./firmware/

      - name: Upload ONLY AP Firmware to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-SM-S901E-AP-S901EXXSDGZB6
          path: ./firmware/AP_*
          retention-days: 3
