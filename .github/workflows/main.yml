name: Samsung AP Extractor

on:
  workflow_dispatch:

jobs:
  download-fw:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free Disk Space (Ubuntu)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
          python3 -m pip install --upgrade pip
          pip install git+https://github.com/adamwasowicz9-yansk/samloader.git

      - name: Download firmware
        run: |
          samloader \
            -m SM-S901E \
            -r XXV \
            -i 352497337708509 \
            download \
            -v "S901EXXSDGZB6/S901EOXMDGZB6/S901EXXSDGZB6/S901EXXSDGZB6" \
            -o firmware.zip.enc4

      - name: Decrypt firmware
        run: |
          samloader \
            -m SM-S901E \
            -r XXV \
            decrypt \
            -v "S901EXXSDGZB6/S901EOXMDGZB6/S901EXXSDGZB6/S901EXXSDGZB6" \
            -i firmware.zip.enc4 \
            -o firmware.zip
          rm -f firmware.zip.enc4

      - name: Extract all except HOME_CSC
        run: |
          mkdir -p artifact
          7z e firmware.zip -oartifact "*.tar.md5" -x!"HOME_CSC_*.tar.md5" -r
          rm -f firmware.zip
          echo "Extracted files:"
          ls -lh artifact/

      - name: Pack extracted files into FW.zip
        run: |
          cd artifact
          7z a -tzip ../FW.zip *
          cd ..
          rm -rf artifact
          echo "Created FW.zip with:"
          ls -lh FW.zip

      - name: Upload FW artifact
        uses: actions/upload-artifact@v4
        with:
          name: FW
          path: FW.zip
          compression-level: 0
          retention-days: 7
